name: Deploy to Gcore
on:
  push: { branches: [main] }
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.GCORE_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run build
      # aws cli v2 падает на listing-ответах не-AWS S3 ("NoneType is not a
      # container or iterable"), поэтому синкаем rclone'ом — Gcore сам
      # рекомендует его для Object Storage.
      - name: Install rclone
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rclone
      - name: Sync to Gcore Object Storage
        env:
          RCLONE_S3_ACCESS_KEY_ID: ${{ secrets.GCORE_S3_KEY }}
          RCLONE_S3_SECRET_ACCESS_KEY: ${{ secrets.GCORE_S3_SECRET }}
          RCLONE_S3_PROVIDER: Other
          RCLONE_S3_REGION: us-east-1
          RCLONE_S3_ENDPOINT: https://${{ vars.GCORE_S3_ENDPOINT }}
        run: |
          echo "--- доступные бакеты на аккаунте ---"
          rclone lsd :s3: || true
          # sync = сделать бакет идентичным dist/ (лишние файлы удаляются)
          rclone sync dist/ ":s3:${{ vars.GCORE_BUCKET }}" --checksum -v --stats-one-line
      # Публичное чтение объектов (сайт отдаётся напрямую/через CDN).
      # put-bucket-policy идемпотентен; s3api-команды не подвержены багу
      # высокоуровневого `aws s3 sync` на не-AWS S3.
      - name: Ensure public-read bucket policy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.GCORE_S3_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.GCORE_S3_SECRET }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3api put-bucket-policy \
            --bucket "${{ vars.GCORE_BUCKET }}" \
            --endpoint-url "https://${{ vars.GCORE_S3_ENDPOINT }}" \
            --policy '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"AWS":["*"]},"Action":["s3:GetObject"],"Resource":["arn:aws:s3:::${{ vars.GCORE_BUCKET }}/*"]}]}'
      # Без этого шага CDN продолжает отдавать закешированный index.html со
      # ссылками на старые (по контент-хэшу) JS/CSS, которые rclone sync выше
      # уже удалил из бакета как отсутствующие в новом dist/ — рабочий сайт
      # ловит 403 на ассеты, пока кеш не протухнет сам.
      - name: Purge Gcore CDN cache
        env:
          GCORE_API_TOKEN: ${{ secrets.GCORE_API_TOKEN }}
        run: |
          curl -sf -X POST "https://api.gcore.com/cdn/resources/${{ vars.GCORE_CDN_RESOURCE_ID }}/purge" \
            -H "Authorization: apikey ${GCORE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"paths": []}'
